name: agendamix365
description: AgendaMix 365 - Sua vida organizada. Todos os dias do ano.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.9.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.3.1
  shimmer: ^3.0.0

  # Calendar
  table_calendar: ^3.2.0

  # Date/Time
  intl: ^0.20.2

  # Storage / Files
  file_picker: ^8.1.7
  image_picker: ^1.1.2

  # Voice / Speech
  speech_to_text: ^7.0.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^10.3.1

  # Utils
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  permission_handler: ^11.4.0

  # Icons
  cupertino_icons: ^1.0.8
  flutter_iconly: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
